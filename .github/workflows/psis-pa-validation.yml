name: PSIS PA Validation

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: taig2k/pitching_sequence_intellegence_system_psis

jobs:
  validate:
    name: PSIS Production Artifact Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Record toolchain versions
        id: toolchain
        run: |
          echo "node_version=$(node --version)" >> "$GITHUB_OUTPUT"
          echo "pnpm_version=$(pnpm --version)" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        id: install
        run: |
          pnpm config set minimum-release-age 0
          pnpm install --frozen-lockfile

      - name: Run scenario tests
        id: test
        env:
          PORT: "8080"
          BASE_PATH: /
          NODE_ENV: production
        run: |
          set -o pipefail
          pnpm run test:psis | tee test-output.txt
          echo "result=PASS" >> "$GITHUB_OUTPUT"

      - name: Build application
        id: build
        env:
          PORT: "8080"
          BASE_PATH: /
          NODE_ENV: production
        run: |
          pnpm run build
          echo "result=PASS" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        id: docker_build
        run: |
          docker build \
            -t "${IMAGE_NAME}:ci-${{ github.sha }}" \
            .
          echo "result=PASS" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_NAME}:ci-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Container smoke test (local build)
        id: smoke
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
        run: |
          set -euo pipefail
          host_port=18080
          container_name=psis-pa-smoke

          cleanup() {
            docker stop "${container_name}" 2>/dev/null || true
            docker rm "${container_name}" 2>/dev/null || true
          }
          trap cleanup EXIT

          start_ms=$(date +%s%3N)
          docker run -d --name "${container_name}" -p "${host_port}:8080" \
            -e PORT=8080 \
            -e NODE_ENV=production \
            -e BASE_PATH=/ \
            "$IMAGE"

          sleep 2
          if ! docker ps --filter "name=${container_name}" --filter "status=running" | grep -q "${container_name}"; then
            echo "Container is not running after startup."
            docker ps -a --filter "name=${container_name}" || true
            docker logs "${container_name}" || true
            exit 1
          fi

          health_ok=false
          for _ in $(seq 1 60); do
            if curl -sf "http://localhost:${host_port}/api/healthz" > /tmp/health.json; then
              health_ok=true
              end_ms=$(date +%s%3N)
              break
            fi
            sleep 1
          done

          if [ "$health_ok" != true ]; then
            echo "Health endpoint did not become ready within 60 seconds."
            docker logs "${container_name}" || true
            exit 1
          fi

          startup_ms=$((end_ms - start_ms))
          echo "startup_ms=${startup_ms}" >> "$GITHUB_OUTPUT"

          health_body=$(cat /tmp/health.json)
          echo "Health response: ${health_body}"
          if echo "$health_body" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"ok"'; then
            echo "health_result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "Unexpected health response: ${health_body}"
            exit 1
          fi

          root_code=$(curl -s -o /tmp/root.html -w "%{http_code}" "http://localhost:${host_port}/")
          if [ "$root_code" = "200" ] && grep -q 'id="root"' /tmp/root.html; then
            echo "frontend_result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "Frontend validation failed with HTTP ${root_code}"
            exit 1
          fi

          track_code=$(curl -s -o /tmp/track.html -w "%{http_code}" "http://localhost:${host_port}/track")
          if [ "$track_code" = "200" ] && grep -q 'id="root"' /tmp/track.html; then
            echo "spa_result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "SPA route validation failed with HTTP ${track_code}"
            exit 1
          fi

          echo "container_result=PASS" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish Docker image to Docker Hub
        id: publish
        run: |
          set -euo pipefail

          docker tag "${IMAGE_NAME}:ci-${{ github.sha }}" "${IMAGE_NAME}:latest"
          docker tag "${IMAGE_NAME}:ci-${{ github.sha }}" "${IMAGE_NAME}:${{ github.sha }}"

          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${{ github.sha }}"

          digest=$(docker buildx imagetools inspect "${IMAGE_NAME}:latest" --format '{{.Manifest.Digest}}')

          echo "publish_result=PASS" >> "$GITHUB_OUTPUT"
          echo "image_digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Published ${IMAGE_NAME}:latest and ${IMAGE_NAME}:${{ github.sha }}"
          echo "Image digest: ${digest}"

      - name: Verify Docker Hub tags
        id: verify_tags
        run: |
          set -euo pipefail

          docker buildx imagetools inspect "${IMAGE_NAME}:latest" > /tmp/inspect-latest.json
          docker buildx imagetools inspect "${IMAGE_NAME}:${{ github.sha }}" > /tmp/inspect-sha.json

          latest_digest=$(docker buildx imagetools inspect "${IMAGE_NAME}:latest" --format '{{.Manifest.Digest}}')
          sha_digest=$(docker buildx imagetools inspect "${IMAGE_NAME}:${{ github.sha }}" --format '{{.Manifest.Digest}}')

          if [ "${latest_digest}" != "${sha_digest}" ]; then
            echo "Tag digests do not match."
            echo "latest: ${latest_digest}"
            echo "sha: ${sha_digest}"
            exit 1
          fi

          echo "latest_tag=PASS" >> "$GITHUB_OUTPUT"
          echo "sha_tag=PASS" >> "$GITHUB_OUTPUT"
          echo "Verified tags latest and ${{ github.sha }} share digest ${latest_digest}"

      - name: Pull published image from Docker Hub
        id: pull
        run: |
          set -euo pipefail

          docker rmi "${IMAGE_NAME}:ci-${{ github.sha }}" 2>/dev/null || true
          docker rmi "${IMAGE_NAME}:latest" 2>/dev/null || true
          docker rmi "${IMAGE_NAME}:${{ github.sha }}" 2>/dev/null || true

          docker pull "${IMAGE_NAME}:latest"

          echo "pull_result=PASS" >> "$GITHUB_OUTPUT"

      - name: Validate published image
        id: published_smoke
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:latest
        run: |
          set -euo pipefail
          host_port=18081
          container_name=psis-pa-published

          cleanup() {
            docker stop "${container_name}" 2>/dev/null || true
            docker rm "${container_name}" 2>/dev/null || true
          }
          trap cleanup EXIT

          docker run -d --name "${container_name}" -p "${host_port}:8080" \
            -e PORT=8080 \
            -e NODE_ENV=production \
            -e BASE_PATH=/ \
            "$IMAGE"

          sleep 2
          if ! docker ps --filter "name=${container_name}" --filter "status=running" | grep -q "${container_name}"; then
            echo "Published container is not running after startup."
            docker logs "${container_name}" || true
            exit 1
          fi

          health_ok=false
          for _ in $(seq 1 60); do
            if curl -sf "http://localhost:${host_port}/api/healthz" > /tmp/published-health.json; then
              health_ok=true
              break
            fi
            sleep 1
          done

          if [ "$health_ok" != true ]; then
            echo "Published image health endpoint did not become ready."
            docker logs "${container_name}" || true
            exit 1
          fi

          health_body=$(cat /tmp/published-health.json)
          if echo "$health_body" | grep -Eq '"status"[[:space:]]*:[[:space:]]*"ok"'; then
            echo "health_result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "Unexpected published health response: ${health_body}"
            exit 1
          fi

          root_code=$(curl -s -o /tmp/published-root.html -w "%{http_code}" "http://localhost:${host_port}/")
          if [ "$root_code" = "200" ] && grep -q 'id="root"' /tmp/published-root.html; then
            echo "frontend_result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "Published frontend validation failed with HTTP ${root_code}"
            exit 1
          fi

          track_code=$(curl -s -o /tmp/published-track.html -w "%{http_code}" "http://localhost:${host_port}/track")
          if [ "$track_code" = "200" ] && grep -q 'id="root"' /tmp/published-track.html; then
            echo "spa_result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "Published SPA route validation failed with HTTP ${track_code}"
            exit 1
          fi

          echo "container_result=PASS" >> "$GITHUB_OUTPUT"

      - name: Generate PA validation report
        env:
          COMMIT_SHA: ${{ github.sha }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_DIGEST: ${{ steps.publish.outputs.image_digest }}
          PUBLISH_RESULT: ${{ steps.publish.outputs.publish_result }}
          PULL_RESULT: ${{ steps.pull.outputs.pull_result }}
          LATEST_TAG_RESULT: ${{ steps.verify_tags.outputs.latest_tag }}
          SHA_TAG_RESULT: ${{ steps.verify_tags.outputs.sha_tag }}
          PUBLISHED_HEALTH: ${{ steps.published_smoke.outputs.health_result }}
          PUBLISHED_FRONTEND: ${{ steps.published_smoke.outputs.frontend_result }}
          PUBLISHED_SPA: ${{ steps.published_smoke.outputs.spa_result }}
          PUBLISHED_CONTAINER: ${{ steps.published_smoke.outputs.container_result }}
        run: |
          mkdir -p docs/reports
          {
            echo "# PSIS Production Artifact (PA) Validation Report"
            echo ""
            echo "**Generated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo "**Workflow Name:** ${WORKFLOW_NAME}"
            echo "**Run ID:** ${RUN_ID}"
            echo "**Run URL:** ${RUN_URL}"
            echo "**Commit SHA:** \`${COMMIT_SHA}\`"
            echo ""
            echo "## Docker Image"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Image Name | \`${IMAGE_NAME}\` |"
            echo "| Tags | \`latest\`, \`${COMMIT_SHA}\` |"
            echo "| Image Digest | \`${IMAGE_DIGEST}\` |"
            echo ""
            echo "## Publication & Consumption"
            echo ""
            echo "| Stage | Result |"
            echo "|-------|--------|"
            echo "| Docker Hub publish | ${PUBLISH_RESULT} |"
            echo "| \`latest\` tag verified | ${LATEST_TAG_RESULT} |"
            echo "| commit SHA tag verified | ${SHA_TAG_RESULT} |"
            echo "| Published image pull | ${PULL_RESULT} |"
            echo "| Published container start | ${PUBLISHED_CONTAINER} |"
            echo ""
            echo "## Published Image Smoke Tests"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Health endpoint (\`GET /api/healthz\`) | ${PUBLISHED_HEALTH} |"
            echo "| Frontend load (\`GET /\`) | ${PUBLISHED_FRONTEND} |"
            echo "| SPA route fallback (\`GET /track\`) | ${PUBLISHED_SPA} |"
            echo ""
            echo "## Overall PA Status"
            echo ""
            echo "**PASS**"
            echo ""
            echo "PSIS exists as a validated, independently consumable Production Artifact published to Docker Hub."
            echo ""
            echo "Pull command:"
            echo ""
            echo "\`\`\`bash"
            echo "docker pull ${IMAGE_NAME}:latest"
            echo "docker run --rm -p 8080:8080 -e PORT=8080 -e NODE_ENV=production ${IMAGE_NAME}:latest"
            echo "\`\`\`"
          } > docs/reports/PSIS_PA_Validation_Report.md

      - name: Upload PA validation report
        uses: actions/upload-artifact@v4
        with:
          name: PSIS_PA_Validation
          path: docs/reports/PSIS_PA_Validation_Report.md
          retention-days: 30
