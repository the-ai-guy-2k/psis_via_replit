openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PSIS - Pitch Sequence Intelligence System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: entries
    description: Inning / pitch sequence entries
  - name: dashboard
    description: Dashboard aggregates
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /entries:
    get:
      operationId: listEntries
      tags: [entries]
      summary: List all pitch sequence entries, most recent first
      responses:
        "200":
          description: List of entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Entry"
    post:
      operationId: createEntry
      tags: [entries]
      summary: Record a new pitch sequence entry for a plate appearance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntryInput"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard aggregates across all recorded entries
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    Handedness:
      type: string
      enum: [L, R]
    ResultOutcome:
      type: string
      enum:
        - strikeout
        - ground_out
        - fly_out
        - pop_out
        - double_play
        - weak_contact
        - hit
        - walk
        - home_run
        - hard_contact
        - run_scored
        - pressure_error
    ResultCategory:
      type: string
      enum: [good, bad]
      description: Whether an entry favored the pitcher (good) or the batter (bad)
    OutcomeCategory:
      type: string
      enum: [defense, offense]
      description: Top-level branch of the at-bat outcome wizard
    OutcomeType:
      type: string
      description: Specific outcome selected within a defense or offense branch
      enum:
        - strikeout
        - fly_out
        - ground_out
        - infield_catch
        - double_play
        - triple_play
        - run_scored
        - hit
        - walk
        - home_run
        - extra_base_hit
    OutcomeDetail:
      type: string
      description: Follow-up detail, currently only used for extra_base_hit
      enum: [double, triple]
    CreateEntryInput:
      type: object
      properties:
        pitcherHandedness:
          $ref: "#/components/schemas/Handedness"
        batterHandedness:
          $ref: "#/components/schemas/Handedness"
        pitchSequence:
          type: string
          minLength: 1
          description: The sequence of pitches thrown, e.g. "FB-SL-CH"
        outcomeCategory:
          $ref: "#/components/schemas/OutcomeCategory"
        outcomeType:
          $ref: "#/components/schemas/OutcomeType"
        outcomeDetail:
          $ref: "#/components/schemas/OutcomeDetail"
        playersLeftOnBase:
          type: integer
          minimum: 0
          description: Number of baserunners left on base, when applicable
        notes:
          type: string
      required:
        - pitcherHandedness
        - batterHandedness
        - pitchSequence
        - outcomeCategory
        - outcomeType
    Entry:
      type: object
      properties:
        id:
          type: string
        createdAt:
          type: string
        pitcherHandedness:
          $ref: "#/components/schemas/Handedness"
        batterHandedness:
          $ref: "#/components/schemas/Handedness"
        pitchSequence:
          type: string
        outcomeCategory:
          $ref: "#/components/schemas/OutcomeCategory"
        outcomeType:
          $ref: "#/components/schemas/OutcomeType"
        outcomeDetail:
          $ref: "#/components/schemas/OutcomeDetail"
        playersLeftOnBase:
          type: integer
        result:
          $ref: "#/components/schemas/ResultOutcome"
          description: Legacy flat outcome value, only present on entries created before the outcome wizard
        resultCategory:
          $ref: "#/components/schemas/ResultCategory"
        goodCount:
          type: integer
        badCount:
          type: integer
        strikeoutCount:
          type: integer
        delta:
          type: integer
        notes:
          type: string
      required:
        - id
        - createdAt
        - pitcherHandedness
        - batterHandedness
        - pitchSequence
        - resultCategory
        - goodCount
        - badCount
        - strikeoutCount
        - delta
    SequenceStat:
      type: object
      properties:
        pitchSequence:
          type: string
        totalDelta:
          type: integer
        averageDelta:
          type: number
        occurrences:
          type: integer
      required:
        - pitchSequence
        - totalDelta
        - averageDelta
        - occurrences
    DashboardSummary:
      type: object
      properties:
        recentEntries:
          type: array
          items:
            $ref: "#/components/schemas/Entry"
        bestSequences:
          type: array
          items:
            $ref: "#/components/schemas/SequenceStat"
        worstSequences:
          type: array
          items:
            $ref: "#/components/schemas/SequenceStat"
        totalGood:
          type: integer
        totalBad:
          type: integer
        totalStrikeouts:
          type: integer
        averageDelta:
          type: number
        entryCount:
          type: integer
      required:
        - recentEntries
        - bestSequences
        - worstSequences
        - totalGood
        - totalBad
        - totalStrikeouts
        - averageDelta
        - entryCount
