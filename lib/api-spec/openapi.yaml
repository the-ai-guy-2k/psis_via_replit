openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PSIS - Pitch Sequence Intelligence System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: entries
    description: Inning / pitch sequence entries
  - name: dashboard
    description: Dashboard aggregates
  - name: innings
    description: Inning-by-inning at-bat tracking
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /entries:
    get:
      operationId: listEntries
      tags: [entries]
      summary: List all pitch sequence entries, most recent first
      responses:
        "200":
          description: List of entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Entry"
    post:
      operationId: createEntry
      tags: [entries]
      summary: Record a new pitch sequence entry for a plate appearance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntryInput"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard aggregates across all recorded entries
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
  /innings/current:
    get:
      operationId: getCurrentInning
      tags: [innings]
      summary: Get the active (or most recently completed) inning's state
      responses:
        "200":
          description: Current inning state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InningState"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    Handedness:
      type: string
      enum: [L, R]
    ResultOutcome:
      type: string
      enum:
        - strikeout
        - ground_out
        - fly_out
        - pop_out
        - double_play
        - weak_contact
        - hit
        - walk
        - home_run
        - hard_contact
        - run_scored
        - pressure_error
    ResultCategory:
      type: string
      enum: [good, bad]
      description: Whether an entry favored the pitcher (good) or the batter (bad)
    OutcomeCategory:
      type: string
      enum: [defense, offense]
      description: Top-level branch of the at-bat outcome wizard
    OutcomeType:
      type: string
      description: >-
        Specific outcome selected within a defense or offense branch.
        infield_catch, double_play, triple_play, home_run, and extra_base_hit
        are legacy top-level values retained only so pre-EABR-flow entries
        keep validating; the progressive click flow now produces double_play
        and triple_play as an outcomeDetail of ground_out, and home_run as an
        outcomeDetail of hit.
      enum:
        - strikeout
        - fly_out
        - ground_out
        - infield_out
        - infield_catch
        - double_play
        - triple_play
        - run_scored
        - hit
        - walk
        - home_run
        - extra_base_hit
    OutcomeDetail:
      type: string
      description: >-
        Follow-up detail for outcome types that branch further: fly_out
        (catch location), ground_out (play result), hit (hit type), and the
        legacy extra_base_hit (double/triple only).
      enum:
        - single
        - double
        - triple
        - home_run
        - infield
        - outfield
        - single_play
        - double_play
        - triple_play
    CreateEntryInput:
      type: object
      properties:
        pitcherHandedness:
          $ref: "#/components/schemas/Handedness"
        batterHandedness:
          $ref: "#/components/schemas/Handedness"
        pitchSequence:
          type: string
          minLength: 1
          description: The sequence of pitches thrown, e.g. "FB-SL-CH"
        outcomeCategory:
          $ref: "#/components/schemas/OutcomeCategory"
        outcomeType:
          $ref: "#/components/schemas/OutcomeType"
        outcomeDetail:
          $ref: "#/components/schemas/OutcomeDetail"
        runsScored:
          type: integer
          minimum: 1
          maximum: 4
          description: >-
            Legacy manual override, only accepted (and required) when
            outcomeType is the legacy run_scored value. For hit/walk/home_run
            outcomes, runsScored is always computed server-side from
            base-state advancement and must not be supplied by the client.
        notes:
          type: string
      required:
        - outcomeCategory
        - outcomeType
    BaseState:
      type: object
      description: Runner occupancy on each base, tracked per-inning for the MVP base-state simulation (no steals/errors/tag-ups).
      properties:
        firstBase:
          type: boolean
        secondBase:
          type: boolean
        thirdBase:
          type: boolean
      required:
        - firstBase
        - secondBase
        - thirdBase
    Entry:
      type: object
      properties:
        id:
          type: string
        createdAt:
          type: string
        pitcherHandedness:
          $ref: "#/components/schemas/Handedness"
        batterHandedness:
          $ref: "#/components/schemas/Handedness"
        pitchSequence:
          type: string
        outcomeCategory:
          $ref: "#/components/schemas/OutcomeCategory"
        outcomeType:
          $ref: "#/components/schemas/OutcomeType"
        outcomeDetail:
          $ref: "#/components/schemas/OutcomeDetail"
        runsScored:
          type: integer
          description: >-
            Runs scored on this at-bat. Computed server-side from base-state
            advancement for hit/walk outcomes (0 when no runner crosses
            home), or supplied manually for the legacy run_scored outcome
            type. Absent on entries created before this field existed.
        baseState:
          $ref: "#/components/schemas/BaseState"
          description: Runner occupancy immediately after this at-bat resolves. Absent on entries created before base-state tracking existed.
        playersLeftOnBase:
          type: integer
          description: Runners left on base for the inning this entry completed, auto-calculated from base occupancy. Only ever set on the at-bat that recorded the inning's 3rd out; other at-bats never carry this field.
        result:
          $ref: "#/components/schemas/ResultOutcome"
          description: Legacy flat outcome value, only present on entries created before the outcome wizard
        resultCategory:
          $ref: "#/components/schemas/ResultCategory"
        goodCount:
          type: integer
        badCount:
          type: integer
        strikeoutCount:
          type: integer
        delta:
          type: integer
        inningNumber:
          type: integer
          description: Which inning this at-bat belongs to, server-assigned. Absent on entries created before inning tracking existed.
        outsAdded:
          type: integer
          description: Defensive outs this at-bat contributed (0-3), server-computed and capped so the inning never exceeds 3 outs.
        notes:
          type: string
      required:
        - id
        - createdAt
        - resultCategory
        - goodCount
        - badCount
        - strikeoutCount
        - delta
    SequenceStat:
      type: object
      properties:
        pitchSequence:
          type: string
        totalDelta:
          type: integer
        averageDelta:
          type: number
        occurrences:
          type: integer
      required:
        - pitchSequence
        - totalDelta
        - averageDelta
        - occurrences
    InningState:
      type: object
      properties:
        inningNumber:
          type: integer
        outs:
          type: integer
          description: Defensive outs recorded so far in this inning (0-3)
        completed:
          type: boolean
          description: True once outs reach 3
        totalAtBats:
          type: integer
        goodCount:
          type: integer
        badCount:
          type: integer
        inningDelta:
          type: integer
        runsScored:
          type: integer
          description: Total runs scored across this inning's at-bats, summed from each at-bat's computed runsScored
        playersLeftOnBase:
          type: integer
          description: Runners left on base, auto-calculated from base occupancy once the inning completes
        baseState:
          $ref: "#/components/schemas/BaseState"
          description: Current runner occupancy for this inning (as of the most recent at-bat)
        atBats:
          type: array
          items:
            $ref: "#/components/schemas/Entry"
      required:
        - inningNumber
        - outs
        - completed
        - totalAtBats
        - goodCount
        - badCount
        - inningDelta
        - runsScored
        - playersLeftOnBase
        - baseState
        - atBats
    DashboardSummary:
      type: object
      properties:
        recentEntries:
          type: array
          items:
            $ref: "#/components/schemas/Entry"
        bestSequences:
          type: array
          items:
            $ref: "#/components/schemas/SequenceStat"
        worstSequences:
          type: array
          items:
            $ref: "#/components/schemas/SequenceStat"
        totalGood:
          type: integer
        totalBad:
          type: integer
        totalStrikeouts:
          type: integer
        averageDelta:
          type: number
        entryCount:
          type: integer
      required:
        - recentEntries
        - bestSequences
        - worstSequences
        - totalGood
        - totalBad
        - totalStrikeouts
        - averageDelta
        - entryCount
